<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | My Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav>
      <div class="logo">My Portfolio</div>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="section">
      <h2>Get In Touch</h2>
      <p>Have a question or want to work together? Fill out the form below or reach out directly.</p>
    </section>

    <section class="contact-form">
      <form id="contactForm" action="#" method="POST">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Your Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" required>
        </div>
        
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>
        </div>
        
        <button type="button" class="submit-button" onclick="sendToWhatsApp()">Send Message</button>
      </form>
    </section>

    <section class="contact-info">
      <h3>Other Ways to Reach Me</h3>
      <p>Email: jakejunior2008@gmailcom</p>
      <div class="social-links">
        <a href="#">LinkedIn</a>
        <a href="#">GitHub</a>
        <a href="#">Twitter</a>
      </div>
    </section>
  </main>

  <footer>
    <p>2026 My Portfolio. All rights reserved.</p>
  </footer>

  <script>
    function sendToWhatsApp() {
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const subject = document.getElementById('subject').value;
      const message = document.getElementById('message').value;

      if (!name || !email || !subject || !message) {
        alert('Please fill in all fields!');
        return;
      }

      const whatsappMessage = `Name: ${name}%0AEmail: ${email}%0ASubject: ${subject}%0AMessage: ${message}`;
      const whatsappURL = `https://wa.me/2348145173339?text=${whatsappMessage}`;
      
      window.open(whatsappURL, '_blank');
    }
  </script>
</body>
</html>
